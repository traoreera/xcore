app:
  name: my-app
  env: development
  debug: true
  secret_key: "vjherbvjhe"
  #dotenv: "./extensions/.env"
  plugin_prefix: "/app"
  server_key: "rhverujierf"
  server_key_iterations: 100000
  plugin_tags:
    - "test"

  # ── FastAPI ────────────────────────────────────────────────────
  fastapi:
    title: "My App"
    summary: "API propulsée par xcore"
    description: ""
    version: "1.0.0"
    debug: false
    docs_url: "/docs"
    redoc_url: "/redoc"
    openapi_url: "/openapi.json"
    redirect_slashes: true
    terms_of_service: "https://example.com/terms"
    contact:
      name: "Support"
      email: "support@example.com"
    license_info:
      name: "MIT"
    deprecated: false

  # ── Uvicorn ────────────────────────────────────────────────────
  server:
    app: "main:app"
    host: "0.0.0.0"
    port: 8000
    workers: 1
    reload: false
    log_level: "info"
    proxy_headers: true
    forwarded_allow_ips: "*"

# ── Plugins ───────────────────────────────────────────────────
plugins:
  directory: ./app

  # Clé HMAC-SHA256 utilisée pour vérifier plugin.sig
  secret_key: "67e192bc581337d646cda6051e5fb9e1f66b1bfaf00db37f5aa1c508fc21ebe6"

  # true = refuse tout plugin Trusted non signé
  strict_trusted: false

  # Intervalle du watcher de rechargement à chaud (secondes)
  # Mettre à 0 pour désactiver en prod si tu gères les reloads via API
  interval: 10

  entry_point: src/main.py

  # Fichiers/extensions exclus du snapshot de détection de changements
  snapshot:
    extensions: [".log", ".pyc", ".html", ".map", ".min.js"]
    filenames: ["__pycache__", "__init__.py", ".env", ".DS_Store"]
    hidden: true

# ── Services ──────────────────────────────────────────────────
services:
  # ── Bases de données ────────────────────────────────────────
  databases:
    db:
      type: sqlasync
      url: sqlite+aiosqlite:///db.sqlite3
      echo: false
    redis_db:
      type: redis
      url: redis://localhost:6379/0
      max_connections: 50

  # ── Cache ────────────────────────────────────────────────────
  cache:
    backend: memory

  # ── Scheduler ────────────────────────────────────────────────
  scheduler:
    enabled: true
    backend: redis # redis = tâches persistantes, survivent au redémarrage
    timezone: Europe/Paris
    pickle_protocol: 5

    # Jobs déclarés statiquement (optionnel — les plugins peuvent aussi en ajouter)
    #jobs:
    #  - id: cleanup_sessions
    #    func: myapp.tasks.maintenance:cleanup_sessions
    #    trigger: cron
    #    hour: 2
    #    minute: 0
    #
    #  - id: metrics_snapshot
    #    func: myapp.tasks.monitoring:snapshot_metrics
    #    trigger: interval
    #    minutes: 5

  # ── Celery / XWorker ──────────────────────────────────────────
  # Accès depuis les plugins : self.ctx.services.get("worker")
  # Lancer le worker   : xcore worker start celery
  # Lancer le beat     : xcore worker beat
  # Inspecter          : xcore worker inspect
  xworker:
    enabled: false

    # Nom de l'app Celery (affiché dans les logs et Flower)
    name: my-app

    # Broker et backend de résultats (Redis recommandé)
    broker_url: redis://localhost:6379/0
    result_backend: redis://localhost:6379/1

    # File par défaut si aucune queue n'est précisée dans @task()
    task_default_queue: default

    # Nombre de processus worker Celery (override via -c à la CLI)
    concurrency: 4

    # Limites de temps des tâches (secondes)
    task_soft_time_limit: 300 # envoie SoftTimeLimitExceeded — pour cleanup
    task_time_limit: 360 # kill forcé si dépassé

    # Sérialisation
    task_serializer: json
    result_serializer: json
    accept_content:
      - json

    # Durée de conservation des résultats (secondes) — 24h
    result_expires: 86400

    broker_connection_retry_on_startup: true

    # Files d'attente déclarées
    queues:
      - default
      - result
      # - emails       # ajouter selon les besoins de l'application
      # - submissions

    # Modules Python contenant les tâches @task() à charger au démarrage
    # Exemple : modules: [myapp.tasks.emails, myapp.tasks.reports]
    modules:
      - app.task.emails

  # ── Extensions ────────────────────────────────────────────────

marketplace:
  url: "https://api.xcorehub.dev/app/marketplace/" # "https://marketplace.xcore.dev"
  #api_url: "https://api.xcorehub.dev"
  api_key: null
  timeout: 10
  cache_ttl: 300

# ── Observabilité ─────────────────────────────────────────────
observability:
  logging:
    level: DEBUG # DEBUG | INFO | WARNING | ERROR | CRITICAL
    format: "%(asctime)s [%(levelname)s] [%(name)s] %(message)s"
    file: log/app.log
    max_bytes: 52428800 # 50 MB par fichier
    backup_count: 10 # 10 fichiers de rotation = 500 MB max
    output: json # text
  metrics:
    enabled: true
    backend: prometheus # memory | prometheus | statsd
    prefix: myapp

  tracing:
    enabled: false
    backend: noop # noop | opentelemetry | jaeger
    service_name: my-app
    endpoint: null # ex: http://jaeger:4317 (OTLP gRPC)

# ── Sécurité ──────────────────────────────────────────────────
security:
  # Imports Python autorisés dans les plugins Sandboxed (whitelist AST)
  # Les plugins Trusted ne sont pas limités par cette liste
  allowed_imports:
    - argparse
    - fastapi
    - json
    - re
    - math
    - random
    - datetime
    - time
    - pathlib
    - typing
    - dataclasses
    - enum
    - functools
    - itertools
    - collections
    - string
    - hashlib
    - base64
    - asyncio
    - logging
    - uuid
    - decimal
    - copy

  # Imports explicitement interdits (surcharge les allowed_imports)
  forbidden_imports:
    - os

  # Rate limit appliqué par défaut à chaque plugin non configuré
  rate_limit_default:
    calls: 200
    period_seconds: 60

tenancy:
  # Active le système multi-tenant (false = tout tourne sous default_tenant)
  enabled: false
  # Header HTTP lu pour identifier le tenant
  header: "X-Tenant-ID"

  # Extraire le tenant depuis le sous-domaine (acme.myapp.com → "acme")
  subdomain: false

  # Tenant utilisé si aucun header / sous-domaine trouvé
  default_tenant: "default"

  # Préfixe automatique des clés cache par tenant_id ("acme:invoices")
  isolate_cache: true

  # SET search_path TO <tenant_id>, public avant chaque requête DB (PostgreSQL)
  isolate_db: true

  # Préfixe les job_id APScheduler par tenant_id ("acme:cleanup")
  isolate_scheduler: false

  # Vérifie allowed_callers sur chaque appel IPC plugin-à-plugin
  enforce_ipc: false

middleware:
  - name: timing
    module: xcore.kernel.api.middlewares.timing:RequestTimingMiddleware

  - name: cache_header
    module: xcore.kernel.api.middlewares.cache_header:CacheHeaderMiddleware
    config:
      - name: header_prefix
        type: external
        value: "X-App"
      - name: cache_getter
        type: internal
        value: cache

cors:
  allow_origins: ["*", "http://localhost:3000", "http://localhost:3001"]
  allow_credentials: false
  allow_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
  allow_headers: ["*"]
