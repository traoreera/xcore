# ── À fusionner dans votre pyproject.toml existant ────────────
# Ajoutez ces sections sous [tool.poetry.dependencies] ou à la fin

[tool.black]
line-length = 88
target-version = ["py310", "py311", "py312"]
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.venv
  | venv
  | alembic
  | static
  | dist
  | build
  | __pycache__
)/
'''

[tool.isort]
# Profil black : isort respecte exactement le style de black
profile = "black"
line_length = 88
skip_glob = [
    "alembic/*",
    "static/*",
    "__pycache__/*",
    ".venv/*",
    "venv/*",
]
known_first_party = ["xcore"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-q --tb=short"

[tool.coverage.run]
source = ["xcore"]
branch = true
omit = [
    "*/tests/*",
    "*/__pycache__/*",
    "*/alembic/*",
]

[tool.coverage.report]
show_missing = true
skip_covered = false
fail_under = 80   # CI échoue si couverture < 80%
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "@(abc\\.)?abstractmethod",
]
