site_name: Xcore Framework
site_description: Plugin-first backend framework built on FastAPI
site_url: https://xcorehub.dev
repo_url: https://github.com/traoreera/xcore
repo_name: traoreera/xcore
edit_uri: edit/main/doc/
docs_dir: doc
site_dir: docs
theme:
  name: material
  custom_dir: doc/overrides
  language: en
  logo: assets/logo.svg
  favicon: assets/logo.svg
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - toc.integrate
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - content.action.edit

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/traoreera/xcore
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/xcore/
    - icon: fontawesome/solid/paper-plane
      link: https://t.me/xcore_framework

copyright: |
  Copyright &copy; 2026 XCore Team &mdash;
  Built with <a href="https://squidfunk.github.io/mkdocs-material/" target="_blank" rel="noopener">Material for MkDocs</a>

nav:
  - Introduction: index.md
  - Pourquoi xcore ?: why-xcore.md
  - Getting Started:
      - Installation: installation.md
      - Quickstart: quickstart.md
  - Core Architecture:
      - Kernel & Lifecycle: kernel/kernel.md
      - Execution Modes: kernel/execution-modes.md
      - Plugin Context: kernel/context.md
  - Plugin Development:
      - Development Guide: plugins/development-guide.md
      - Plugin Anatomy: plugins/plugin-anatomy.md
      - Trusted Plugins: plugins/trusted-plugins.md
      - Sandboxed Plugins: plugins/sandboxed-plugins.md
      - Events & Hooks: plugins/events-hooks.md
      - Permissions & Policies: plugins/permissions.md
  - Services:
      - Overview: services/services.md
      - Database: services/database.md
      - Cache: services/cache.md
      - Scheduler: services/scheduler.md
      - XWorker: services/xworker.md
      - Custom Services: services/custom-services.md
  - Observability: observability/observability.md
  - Advanced Features:
      - Multi-Tenancy: advanced/multi-tenancy.md
      - Plugin Registry: advanced/registry.md
      - Middleware Pipeline: advanced/middleware.md
      - Middleware Internals: advanced/middleware-internals.md
  - Reference:
      - Xcore Configuration: reference/xcore-config.md
  - Examples:
      - Overview: examples/overview.md
      - Application complète: examples/full-app.md
      - User Management: examples/auth-example.md
      - Secure Sandbox: examples/sandbox-example.md
      - Multi-Tenant Analytics: examples/tenancy-example.md
      - Scheduled Syncer: examples/scheduler-example.md
  - SDK:
      - Concepts: sdk/concepts.md
      - API:
          - Overview: sdk/api/index.md
          - Database:
              - Adapters: sdk/api/adapters.md
          - Authentication:
              - Auth: sdk/api/auth.md
          - Mixins & Decorators:
              - SDK Mixin: sdk/api/automixin.md
              - Cache: sdk/api/cache.md
              - Decorators: sdk/api/decorators.md
              - Events: sdk/api/events.md
              - Scheduler: sdk/api/scheduler.md
          - Utilities:
              - Response: sdk/api/responses.md
              - Observability: sdk/api/observability.md
          - Configuration:
              - Manifest: sdk/api/manifest.md
      - Examples: sdk/examples/demo-plugin.md

  - Security & Sandboxing: security/security.md
  - Observability: observability/observability.md
  - Command Line Interface:
      - Overview: cli/index.md
      - Getting Started:
          - Installation: cli/getting-started/install.md
          - Configuration: cli/getting-started/configuration.md
          - Authentication: cli/getting-started/auth.md
      - Base Commands:
          - Project Init: cli/commands/init.md
          - Health Check: cli/commands/health.md
      - Manager:
          - Overview: cli/manager/index.md
          - Monitoring: cli/manager/monitoring.md
          - Services: cli/manager/services.md
      - Plugins:
          - Overview: cli/plugin/index.md
          - Installation: cli/plugin/install.md
          - Local Development: cli/plugin/local.md
          - Marketplace: cli/plugin/marketplace.md
          - Runtime Control: cli/plugin/runtime.md
          - Security: cli/plugin/security.md
          - Updates: cli/plugin/update.md
      - Workers:
          - Overview: cli/worker/index.md
          - Orchestration: cli/worker/process.md
      - Sandbox: cli/sandbox/index.md
      - Migrations: cli/migration/index.md
      - Configuration: cli/config/index.md
      - Full Reference: cli/reference.md
  - Best Practices: best-practices.md
  - Changelog: changelog.md

plugins:
  - search:
      lang: en
  - autorefs
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      title: On this page
  - tables
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
