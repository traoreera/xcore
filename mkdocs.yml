site_name: XCore Framework
site_description: Framework d'orchestration plugin-first sur FastAPI — v2.1.3
site_author: Eliezer Traore
site_url: https://xcore.readthedocs.io

docs_dir: doc
site_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/traoreera/xcore
  version:
    provider: mike
  analytics:
    feedback:
      title: Cette page vous a-t-elle été utile ?
      ratings:
        - icon: material/thumb-up-outline
          name: Oui
          data: 1
          note: Merci pour votre retour !
        - icon: material/thumb-down-outline
          name: Non
          data: 0
          note: Merci — nous allons améliorer cette page.

plugins:
  - search
  - minify:
      minify_html: true
  - mkdocstrings:
      handlers:
        python:
          paths: [..]
          options:
            docstring_style: google
            show_source: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

nav:
  - Accueil: index.md

  - Démarrage:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md

  - Guides:
      - Créer un Plugin: guides/creating-plugins.md
      - Services (DB, Cache, Scheduler, Celery): guides/services.md
      - Middlewares: guides/middlewares.md
      - Événements & Hooks: guides/events.md
      - Sécurité: guides/security.md
      - Marketplace: guides/marketplace.md
      - Monitoring: guides/monitoring.md
      - Scalabilité: guides/scaling.md
      - Troubleshooting: guides/troubleshooting.md

  - Référence:
      - SDK: reference/sdk.md
      - Configuration (integration.yaml): reference/configuration.md
      - CLI: reference/cli.md
      - API: reference/api.md
      - Benchmarks: reference/benchmarks.md

  - Architecture:
      - Vue d'ensemble: architecture/overview.md
      - Décisions: architecture/decisions.md

  - Déploiement:
      - Guide: deployment/guide.md

  - Développement:
      - Tests: development/testing.md
      - Contribuer: development/contributing.md

  - Exemples:
      - Vue d'ensemble: examples/README.md
      - Plugin basique: examples/basic-plugin.md
      - Plugin complet: examples/complete-plugin.md
      - Plugin Trusted: examples/trusted-plugin.md
      - Plugin Sandboxed: examples/sandboxed-plugin.md

  - Versions & Changelog:
      - Historique des versions: versions.md
      - Changelog complet: ../CHANGELOG.md

  - Vision: vision.md

