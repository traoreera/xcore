site_name: XCore Framework
site_description: Plugin-first orchestration framework built on FastAPI
site_author: XCore Team
site_url: https://xcore.readthedocs.io

docs_dir: .
site_dir: ../docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/traoreera/xcore
  version:
    provider: mike

plugins:
  - search
  - minify:
      minify_html: true
  - mkdocstrings:
      handlers:
        python:
          paths: [..]
          options:
            docstring_style: google
            show_source: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

nav:
  - Accueil: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - Guides:
    - Créer un Plugin: guides/creating-plugins.md
    - Services (DB, Cache, Scheduler): guides/services.md
    - Événements & Hooks: guides/events.md
    - Sécurité: guides/security.md
    - Monitoring: guides/monitoring.md
    - Scalabilité: guides/scaling.md
    - Troubleshooting: guides/troubleshooting.md
  - Reference:
    - SDK: reference/sdk.md
    - Configuration: reference/configuration.md
    - CLI: reference/cli.md
    - API: reference/api.md
    - Benchmarks: reference/benchmarks.md
  - Architecture:
    - Vue d'ensemble: architecture/overview.md
    - Décisions: architecture/decisions.md
  - Deployment:
    - Guide: deployment/guide.md
  - Development:
    - Tests: development/testing.md
    - Contribuer: development/contributing.md
  - Exemples:
    - Plugin basique: examples/basic-plugin.md
    - Plugin complet: examples/complete-plugin.md
    - Plugin Trusted: examples/trusted-plugin.md
    - Plugin Sandboxed: examples/sandboxed-plugin.md
  - Changelog: versions.md

