repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ["--unsafe"]
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: autoflake
        name: autoflake
        entry: poetry run autoflake
        language: system
        types: [python]
        args: ["--in-place", "--recursive", "--remove-unused-variables", "--ignore-init-module-imports"]

      - id: autopep8
        name: autopep8
        entry: poetry run autopep8
        language: system
        types: [python]
        args: ["--in-place", "--recursive"]

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black

  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        args: ["--max-line-length=88", "--extend-ignore=E203"]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: ["-r", "xcore"]

  - repo: local
    hooks:
      - id: make-test
        name: Run project tests
        entry: poetry run make test
        language: system
        always_run: true
        pass_filenames: false
