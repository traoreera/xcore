name: PR – Quality Gate

on:
  pull_request:
    branches: [features, main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:

  # ── Vérification du titre de la PR ────────────────────────────────────────
  pr-title:
    name: 📋 PR Title Check
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Check Conventional Commits format
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            refactor
            test
            chore
            perf
            ci
          requireScope: false
          subjectPattern: ^.{1,80}$
          subjectPatternError: |
            Le titre de la PR doit respecter le format Conventional Commits :
            feat(scope): description courte
            fix: correction de bug
            docs: mise à jour de la documentation

  # ── Auto-label selon les fichiers modifiés ─────────────────────────────────
  labeler:
    name: 🏷️ Auto Label
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true

  # ── Taille de la PR ────────────────────────────────────────────────────────
  pr-size:
    name: 📏 PR Size Check
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR size
        run: |
          ADDITIONS=$(gh pr view ${{ github.event.pull_request.number }} \
            --json additions --jq '.additions')
          DELETIONS=$(gh pr view ${{ github.event.pull_request.number }} \
            --json deletions --jq '.deletions')
          TOTAL=$((ADDITIONS + DELETIONS))

          echo "Lines changed: +$ADDITIONS / -$DELETIONS (total: $TOTAL)"

          if [ $TOTAL -gt 800 ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body \
              "⚠️ **PR très large** ($TOTAL lignes modifiées). Pensez à la découper en plusieurs PRs plus petites pour faciliter la revue."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Vérification que les tests passent ────────────────────────────────────
  quick-test:
    name: ⚡ Quick Test
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    permissions:
      contents: read

    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-in-project: true

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-pr-${{ hashFiles('poetry.lock') }}

      - name: Install deps
        run: poetry install --no-interaction

      - name: Run tests
        env:
          DATABASE_URL: sqlite:///./test.db
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: pr-test-key
        run: poetry run pytest tests/ -q --tb=short -x
        # -x : stoppe au premier échec

  # ── Résumé ─────────────────────────────────────────────────────────────────
  pr-gate:
    name: ✅ PR Gate
    runs-on: ubuntu-latest
    needs: [pr-title, quick-test]
    if: always()
    permissions:
      contents: read
    steps:
      - name: Evaluate gate
        run: |
          if [[ "${{ needs.pr-title.result }}"    == "failure" ||
                "${{ needs.quick-test.result }}"    == "failure" ]]; then
            echo "PR gate FAILED – merge bloqué"
            exit 1
          fi
          echo "PR gate PASSED ✓"
